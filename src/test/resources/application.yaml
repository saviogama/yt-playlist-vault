spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/yt_playlist_vault
    username: yt_playlist_vault
    password: yt_playlist_vault

  data:
    redis:
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

  rabbitmq:
    dynamic: false
    listener:
      simple:
        auto-startup: false

  cache:
    type: none

app:
  snapshot-scheduler:
    enabled: false
