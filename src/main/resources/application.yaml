spring:
  application:
    name: yt-playlist-vault

  datasource:
    url: jdbc:postgresql://localhost:5432/yt_playlist_vault
    username: yt_playlist_vault
    password: yt_playlist_vault

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/youtube.readonly

app:
  snapshot-scheduler:
    enabled: true
    fixed-delay: PT72H
    initial-delay: PT1M
